<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiss Sense</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #292f33;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <video id="vid" autoplay muted loop playsinline preload="auto">
<source src="https://joppeschenning.github.io/swisssense-commercial/SwissSenseCustomerDisplayGIF.webm" 
  type="video/webm" />
  </video>

  <script>
    var vid = document.getElementById('vid');

    // Force play as soon as enough data is loaded
    vid.addEventListener('canplay', function () {
      vid.play().catch(function () {
        // If autoplay blocked, reload page and try again
        setTimeout(function () { location.reload(); }, 3000);
      });
    });

    // If video fails to load, reload the page after 5 seconds
    vid.addEventListener('error', function () {
      setTimeout(function () { location.reload(); }, 5000);
    });

    // If video stalls, reload after 5 seconds
    vid.addEventListener('stalled', function () {
      setTimeout(function () { location.reload(); }, 5000);
    });

    // Watchdog: if no playback starts within 8 seconds, reload
    setTimeout(function () {
      if (vid.paused || vid.currentTime === 0) {
        location.reload();
      }
    }, 8000);
  </script>
</body>
</html>
